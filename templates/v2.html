<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hairstyle Recommender · V2</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='v2.css') }}">
</head>
<body>
  <header class="topbar">
    <h1>Hairstyle Recommender <span class="badge">v2</span></h1>
    <p class="sub">Mediapipe geometry + CLIP visual similarity</p>
  </header>

  <main class="container">

    <!-- Upload panel -->
    <section class="panel" id="panel-upload">
      <h2>1 · Upload your photo</h2>
      <label class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept="image/*" hidden>
        <span id="dz-hint">Click or drop a front-facing photo</span>
        <img id="preview" alt="" hidden>
      </label>

      <div class="row">
        <label>Hair length
          <select id="hair-length">
            <option value="">Any</option>
            <option>Short</option>
            <option>Long</option>
            <option>Updo</option>
          </select>
        </label>
        <label>Results
          <select id="k">
            <option>6</option><option>9</option><option>12</option>
          </select>
        </label>
        <button id="go" disabled>Analyze</button>
      </div>
      <p class="privacy">Your photo is processed on this server and not shared with third parties.</p>
      <div id="status" class="status" hidden></div>
    </section>

    <!-- Analysis panel -->
    <section class="panel" id="panel-analysis" hidden>
      <h2>2 · Your face</h2>
      <div class="analysis-grid">
        <figure>
          <img id="annotated" alt="annotated face">
          <figcaption>Measurement overlay</figcaption>
        </figure>
        <div>
          <p class="verdict">
            <strong id="primary-shape">—</strong>
            <span id="secondary-wrap" hidden> · leaning <span id="secondary-shape"></span></span>
            <span class="conf">confidence <span id="confidence">—</span></span>
          </p>
          <p id="advice" class="advice"></p>
          <div id="prob-bars" class="bars"></div>
          <details>
            <summary>Raw geometry features</summary>
            <table id="feature-table"></table>
          </details>
        </div>
      </div>
    </section>

    <!-- Recommendations panel -->
    <section class="panel" id="panel-recs" hidden>
      <h2>3 · Recommended styles</h2>
      <div id="recs" class="recs-grid"></div>
    </section>

  </main>

  <footer class="foot">
    <a href="/legacy">legacy v1 UI</a>
  </footer>

  <script src="{{ url_for('static', filename='v2.js') }}"></script>
</body>
</html>
